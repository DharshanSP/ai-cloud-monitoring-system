<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - AI Cloud Sentinel</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .tm-table { width: 100%; border-collapse: collapse; text-align: left; }
        .tm-table th { padding: 12px; background: rgba(0,0,0,0.2); color: var(--text-secondary); border-bottom: 1px solid var(--glass-border); font-size: 0.8rem; text-transform: uppercase; }
        .tm-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .tm-table tr:hover { background: rgba(255,255,255,0.02); }
        .high-cpu { color: var(--error); font-weight: bold; }
        .med-cpu { color: var(--warning); }
    </style>
</head>
<body>
<div class="container" style="max-width: 1000px; margin: 0 auto;">
    <header style="margin-bottom: 20px;">
        <h1>📋 TASK MANAGER <span style="font-size: 0.8rem; opacity: 0.6; vertical-align: middle;">(Local Server)</span></h1>
    </header>
    
    <div class="glass-card" style="padding: 0; overflow: hidden;">
        <table class="tm-table">
            <thead>
                <tr>
                    <th>PID</th>
                    <th>Process Name</th>
                    <th>CPU %</th>
                    <th>Memory %</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="process-list">
                <tr><td colspan="5" style="text-align: center; padding: 20px;">Loading processes...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
async function fetchProcesses() {
    try {
        const res = await fetch('/api/processes');
        const data = await res.json();
        
        const tbody = document.getElementById('process-list');
        tbody.innerHTML = '';
        
        data.processes.forEach(p => {
            const tr = document.createElement('tr');
            
            let cpuClass = '';
            if (p.cpu > 10) cpuClass = 'high-cpu';
            else if (p.cpu > 2) cpuClass = 'med-cpu';
            
            tr.innerHTML = `
                <td style="color: var(--text-secondary);">${p.pid}</td>
                <td style="font-weight: 600;">${p.name}</td>
                <td class="${cpuClass}">${p.cpu.toFixed(1)}%</td>
                <td>${p.memory.toFixed(1)}%</td>
                <td style="color: var(--success); font-size: 0.8rem; text-transform: uppercase;">${p.status}</td>
            `;
            tbody.appendChild(tr);
        });
    } catch(e) {
        console.error(e);
    }
}

// Initial fetch and poll every 2 seconds
fetchProcesses();
setInterval(fetchProcesses, 2000);
</script>
</body>
</html>
